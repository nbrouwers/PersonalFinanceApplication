name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend deps
        run: cd backend && npm ci
      - name: Run linter
        run: cd backend && npm run lint || true
      - name: Run tests
        run: cd backend && npm test -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://postgres:@localhost:5432/test
          REDIS_URL: redis://localhost:6379

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Run tests
        run: cd frontend && npm test -- --watchAll=false --passWithNoTests

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker-compose -f docker/docker-compose.yml build
      - name: Verify containers start
        run: |
          docker-compose -f docker/docker-compose.yml up -d
          sleep 10
          docker-compose -f docker/docker-compose.yml ps
          docker-compose -f docker/docker-compose.yml down

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production
        run: echo "Deploy step - configure for your target"